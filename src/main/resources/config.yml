# BMS-ChatManager Config

# Mentions feature
features:
  mentions_enabled: true

# Chat formatting (MiniMessage, legacy &a/&#FF0000, PAPI support)
# Placeholders: <player>, <message>, %luckperms_prefix%, %luckperms_suffix%, %player_name%
formats:
  default:
    priority: 0
    format: "%luckperms_prefix%<player> <gray>»</gray> <message>"
  admin:
    priority: 10
    permission: "chatmanager.format.admin"
    format: "<red>[Admin]</red> %luckperms_prefix%<player> <gray>»</gray> <message>"

# Chat channels (Global, Staff, Admin)
channels:
  global:
    format: "formats.default"
    permission: ""
  staff:
    format: "<blue>[Staff]</blue> <player> <white>»</white> <message>"
    permission: "chatmanager.staff"
  admin:
    format: "<dark_red>[Admin Chat]</dark_red> <player> <white>»</white> <message>"
    permission: "chatmanager.admin"

# Chat filter (swear_words.yml contains the blocked words list)
filter:
  enabled: true
  replace_with: "***"
  enforcement_action: "warn" # Options: none, warn, mute, kick

# DiscordSRV integration
discord:
  enabled: true
  sync_chat: true
  channels:
    global: "global"
    staff: "staff-chat"
    admin: "admin-chat"
  webhook_url: "" # Discord Webhook for rich logs (leave blank to disable)

# Anti-spam features
spam:
  enabled: true
  prevent_identical: true
  max_caps_percentage: 70
  min_message_length_for_caps: 5

# Anti-advertisement features
ads:
  enabled: true
  block_ips: true
  block_domains: true
  whitelist:
    - "yourserver.com"
    - "youtube.com"

# Chat cooldowns (seconds)
cooldowns:
  enabled: true
  default: 3
  vip: 1

# Sound settings
sounds:
  mentions:
    enabled: true
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP" # Spigot sound name
    volume: 1.0
    pitch: 1.0

# Chat format permissions
permissions:
  color: "chatmanager.color"
  hex: "chatmanager.hex"
  gradient: "chatmanager.gradient"

# Chat logging to daily files (plugins/BMS-ChatManager/logs/)
logs:
  enabled: true

# Interactive chat hover/click formatting
interactive:
  enabled: true
  hover_text: "<gray>Click to message </gray><white>%player_name%</white>!"
  click_command: "/msg %player_name% "
